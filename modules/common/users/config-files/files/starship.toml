# TokyoNight-cyberpunk prompt
# Calm indigo base with neon cyan and pink accents

format = """
[╭─](bold #7aa2f7)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$rust\
$nodejs\
$golang\
$docker_context\
$time
[╰─](bold #7aa2f7)$character"""

# Cyan-led focus with pink used for energy and urgency
[character]
success_symbol = "[▶](bold #00f0ff)"
error_symbol = "[▶](bold #ff006e)"
vimcmd_symbol = "[◀](bold #7aa2f7)"

[username]
format = "[$user]($style)@"
style_user = "bold #00f0ff"
style_root = "bold red"
show_always = false

[hostname]
format = "[$hostname]($style) "
style = "bold #ff79c6"
ssh_only = true

[directory]
truncation_length = 3
truncate_to_repo = false
format = "[$path]($style) "
style = "bold #9ece6a"
truncation_symbol = "…/"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold #bb9af7"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold #ffea00"
conflicted = "≠"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold #ffea00"

[python]
symbol = " "
format = '[$symbol$version]($style) '
style = "bold #7dcfff"

[rust]
symbol = " "
format = '[$symbol$version]($style) '
style = "bold #f7768e"

[nodejs]
symbol = " "
format = '[$symbol$version]($style) '
style = "bold #9ece6a"

[golang]
symbol = " "
format = '[$symbol$version]($style) '
style = "bold #00f0ff"

[docker_context]
symbol = " "
format = '[$symbol$context]($style) '
style = "bold #7aa2f7"

[time]
disabled = false
format = '[$time]($style) '
style = "bold #565f89"
time_format = "%T"
use_12hr = false
