# ===================================
# Input Configuration
# ===================================

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = false
        disable_while_typing = true
        scroll_factor = 1.0
    }
}

# Hyprland 0.51+ uses the new gesture syntax.
gesture = 3, horizontal, workspace
