# ===================================
# Window Rules
# ===================================

# Float specific windows
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(swappy)$
windowrule = float on, match:class ^(thunar)$, match:title ^(File Operation Progress)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:title ^(Picture-in-Picture)$

# Center floating windows
windowrule = center on, match:class ^(pavucontrol)$
windowrule = center on, match:class ^(nm-connection-editor)$
windowrule = center on, match:class ^(swappy)$
windowrule = size 75% 75%, match:class ^(swappy)$

# Default everything else to the overflow workspace.
# Hyprland evaluates rules top to bottom, so specific app rules below override this.
windowrule = workspace 4 silent, match:class ^(.*)$

# Workspace assignments
windowrule = workspace 1 silent, match:class ^(google-chrome|Google-chrome|google-chrome-stable)$
windowrule = workspace 1 silent, match:class ^(chromium|Chromium|chromium-browser)$
windowrule = workspace 2 silent, match:class ^(com\.mitchellh\.ghostty)$
windowrule = workspace 2 silent, match:class ^(foot|footclient)$
windowrule = workspace 3 silent, match:class ^(1Password|1password)$
windowrule = workspace 3 silent, match:class ^(com\.1password\.1Password)$

# Opacity rules
windowrule = opacity 0.95 0.85, match:class ^(thunar)$
windowrule = opacity 0.98 0.90, match:class ^(Code)$

# Pinning for picture-in-picture
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = size 640 360, match:title ^(Picture-in-Picture)$
windowrule = move 100%-660 100%-380, match:title ^(Picture-in-Picture)$
