# ===================================
# Theme Colors
# ===================================

$synthwave_pink = rgb(ff006e)
$synthwave_cyan = rgb(00f0ff)
$synthwave_purple = rgb(9d4edd)
$synthwave_yellow = rgb(ffea00)
$synthwave_bg = rgb(0a0e27)
$synthwave_fg = rgb(e0e0e0)

general {
    col.active_border = $synthwave_cyan $synthwave_pink 45deg
    col.inactive_border = rgba(48538dcc)
}

decoration {
    shadow {
        color = rgba(2a0d3360)
        color_inactive = rgba(00000045)
    }
}

group {
    col.border_active = $synthwave_cyan
    col.border_inactive = rgba(48538dcc)
    col.border_locked_active = $synthwave_yellow
    col.border_locked_inactive = rgba(48538dcc)

    groupbar {
        col.active = $synthwave_purple
        col.inactive = rgba(48538dcc)
        col.locked_active = $synthwave_yellow
        col.locked_inactive = rgba(48538dcc)
    }
}
