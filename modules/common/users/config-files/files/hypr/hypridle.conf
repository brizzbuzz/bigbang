# ===================================
# Hypridle Configuration
# ===================================
# Idle management for Hyprland
# Dims screen, locks, and suspends after periods of inactivity

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on display after waking up
}

# ===================================
# DIM SCREEN
# ===================================
# Dim screen after 3 minutes of inactivity
listener {
    timeout = 180
    on-timeout = ~/.config/hypr/scripts/idle-dim.sh dim
    on-resume = ~/.config/hypr/scripts/idle-dim.sh restore
}

# ===================================
# TURN OFF KEYBOARD BACKLIGHT
# ===================================
# Turn off keyboard backlight after 4 minutes
listener {
    timeout = 240
    on-timeout = ~/.config/hypr/scripts/idle-kbd-backlight.sh off
    on-resume = ~/.config/hypr/scripts/idle-kbd-backlight.sh restore
}

# ===================================
# LOCK SCREEN
# ===================================
# Lock after 7 minutes of inactivity
listener {
    timeout = 420
    on-timeout = loginctl lock-session          # lock screen
}

# ===================================
# TURN OFF SCREEN
# ===================================
# Turn off screen after 9 minutes of inactivity
listener {
    timeout = 540
    on-timeout = hyprctl dispatch dpms off      # turn off screen
    on-resume = hyprctl dispatch dpms on        # turn on screen
}

# ===================================
# SUSPEND SYSTEM
# ===================================
# Suspend after 20 minutes of inactivity
listener {
    timeout = 1200
    on-timeout = systemctl suspend              # suspend system
}
