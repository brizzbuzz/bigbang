force_keyboard_focus = true
close_when_open = true
click_to_close = true
selection_wrap = true
exact_search_prefix = "'"
theme = "synthwave"

[placeholders]
"default" = { input = "Search apps, commands, math", list = "No matches" }
"desktopapplications" = { input = "Launch app", list = "No apps" }
"runner" = { input = "Run command", list = "No commands" }
"calc" = { input = "Calculate", list = "No result" }
"websearch" = { input = "Search web", list = "No results" }
"clipboard" = { input = "Clipboard", list = "Clipboard empty" }

[keybinds]
close = ["Escape"]
next = ["Down", "ctrl j"]
previous = ["Up", "ctrl k"]
toggle_exact = ["ctrl e"]
quick_activate = ["F1", "F2", "F3", "F4"]

[providers]
default = ["desktopapplications", "runner", "calc", "websearch"]
empty = ["desktopapplications"]
max_results = 40

[providers.max_results_provider]
desktopapplications = 20
runner = 20

[[providers.prefixes]]
prefix = ">"
provider = "runner"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = ":"
provider = "clipboard"
